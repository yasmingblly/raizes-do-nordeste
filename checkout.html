<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Raízes do Nordeste</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <a class="logo" href="index.html">Raízes do Nordeste</a>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="cardapio.html">Cardápio</a>
            <a href="carrinho.html">Sacola</a>
            <a class="active" href="checkout.html">Checkout</a>
        </nav>
    </header>

    <main class="page">
        <div class="section-title">
            <h1>Pagamento</h1>
            <p>Escolha uma forma de pagamento simulada para concluir o pedido.</p>
        </div>

        <section class="grid two">
            <form class="card form" id="checkoutForm">
                <label>
                    Forma de pagamento
                    <select name="pagamento" required>
                        <option value="">Selecione</option>
                        <option value="pix">Pix</option>
                        <option value="cartao">Cartão</option>
                    </select>
                </label>
                <label>
                    Nome para retirada
                    <input name="retirada" type="text" placeholder="Seu nome" required>
                </label>
                <button class="btn gold" type="submit">Pagar e confirmar</button>
            </form>

            <aside class="card">
                <span class="badge">Simulação</span>
                <h3>Retorno visual do pagamento</h3>
                <p>Ao confirmar, o sistema registra o pedido como aprovado e abre a tela de confirmação.</p>
            </aside>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>

</html>
