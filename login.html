<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Raízes do Nordeste</title>
        <link rel="icon" type="image/webp" href="assets/favicon.webp">
<link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <a class="logo" href="index.html">Raízes do Nordeste</a>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="cardapio.html">Cardápio</a>
            <a href="cadastro.html">Cadastro</a>
        </nav>
    </header>

    <main class="auth-page">
        <section class="auth-card">
            <h1>Entrar</h1>
            <p>Acesse sua conta para acompanhar pedidos, pontos e dados do perfil.</p>

            <form class="form" id="loginForm">
                <label>
                    E-mail
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </label>
                <label>
                    Senha
                    <input type="password" id="senha" name="senha" placeholder="Sua senha" required>
                </label>
                <button class="btn gold" type="submit">Entrar</button>
            </form>

            <p>Ainda não possui conta? <a href="cadastro.html">Cadastre-se</a></p>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>

</html>
